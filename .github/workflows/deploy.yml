name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'trucking-platform' }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        client-id: ${{ env.AZURE_CLIENT_ID }}
        tenant-id: ${{ env.AZURE_TENANT_ID }}
        subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install Azure Developer CLI
      run: |
        if ! command -v azd &> /dev/null; then
          curl -fsSL https://aka.ms/install-azd.sh | bash
          echo "$HOME/.azd/bin" >> $GITHUB_PATH
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'monorepo/apps/web/package-lock.json'

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.pnpm-store
          monorepo/apps/web/node_modules
          monorepo/apps/web/.next/cache
        key: ${{ runner.os }}-pnpm-${{ hashFiles('monorepo/apps/web/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Install frontend dependencies
      working-directory: monorepo/apps/web
      run: pnpm install --frozen-lockfile

    - name: Build frontend for production
      working-directory: monorepo/apps/web
      run: |
        export NODE_ENV=production
        pnpm build

    - name: Setup Elixir/Phoenix
      run: |
        # Elixir is already installed on the self-hosted runner
        cd monorepo/apps/api
        mix local.hex --force
        mix local.rebar --force
        mix deps.get --only prod
        
    - name: Compile Phoenix application
      working-directory: monorepo/apps/api
      run: |
        export MIX_ENV=prod
        mix deps.compile
        mix compile

    - name: Run frontend tests
      working-directory: monorepo/apps/web
      run: |
        if [ -f "package.json" ] && grep -q '"test"' package.json; then
          pnpm test --passWithNoTests
        fi

    - name: Run backend tests
      working-directory: monorepo/apps/api
      run: |
        export MIX_ENV=test
        mix test --max-failures 1

    - name: Security scan - frontend
      working-directory: monorepo/apps/web
      run: |
        pnpm audit --audit-level moderate || true

    - name: Docker buildx cache
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Deploy to Azure Container Apps
      run: |
        # Set environment variables for azd
        azd auth login --client-id ${{ env.AZURE_CLIENT_ID }} --tenant-id ${{ env.AZURE_TENANT_ID }} --federated-credential-provider "github" --service-principal
        
        # Initialize environment if needed
        if ! azd env list | grep -q "${{ env.AZURE_ENV_NAME }}"; then
          azd env new ${{ env.AZURE_ENV_NAME }} --location ${{ env.AZURE_LOCATION }}
        fi
        
        azd env select ${{ env.AZURE_ENV_NAME }}
        
        # Set required parameters
        azd env set AZURE_LOCATION ${{ env.AZURE_LOCATION }}
        azd env set NEXTAUTH_SECRET ${{ secrets.NEXTAUTH_SECRET }}
        azd env set NEXTAUTH_URL ${{ secrets.NEXTAUTH_URL }}
        azd env set SECRET_KEY_BASE ${{ secrets.SECRET_KEY_BASE }}
        azd env set PHX_HOST ${{ secrets.PHX_HOST }}
        azd env set PHX_SERVER "true"
        azd env set PORT "4000"
        azd env set POSTGRES_ADMIN_PASSWORD ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        
        # Deploy infrastructure and applications
        azd up --no-prompt

    - name: Get deployment URLs
      id: get-urls
      run: |
        WEB_URL=$(azd env get-values | grep "WEB_FRONTEND_URI" | cut -d'=' -f2 | tr -d '"')
        API_URL=$(azd env get-values | grep "PHOENIX_BACKEND_URI" | cut -d'=' -f2 | tr -d '"')
        echo "web_url=$WEB_URL" >> $GITHUB_OUTPUT
        echo "api_url=$API_URL" >> $GITHUB_OUTPUT

    - name: Run smoke tests
      run: |
        # Wait for services to be ready
        sleep 30
        
        # Test web frontend health
        if [ -n "${{ steps.get-urls.outputs.web_url }}" ]; then
          curl -f "${{ steps.get-urls.outputs.web_url }}/api/health" || exit 1
        fi
        
        # Test backend health  
        if [ -n "${{ steps.get-urls.outputs.api_url }}" ]; then
          curl -f "${{ steps.get-urls.outputs.api_url }}/api/health" || exit 1
        fi

    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "🚀 Deployment successful!"
          echo "Web Frontend: ${{ steps.get-urls.outputs.web_url }}"
          echo "Phoenix Backend: ${{ steps.get-urls.outputs.api_url }}"
        else
          echo "❌ Deployment failed!"
        fi

  performance-test:
    needs: build-and-deploy
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js for k6
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install k6
      run: |
        sudo gpg -k
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6

    - name: Run performance tests
      run: |
        # Create basic performance test
        cat > perf-test.js << 'EOF'
        import http from 'k6/http';
        import { check, sleep } from 'k6';

        export let options = {
          stages: [
            { duration: '30s', target: 20 },
            { duration: '1m', target: 20 },
            { duration: '30s', target: 0 },
          ],
        };

        export default function () {
          let response = http.get(process.env.WEB_URL + '/api/health');
          check(response, {
            'status is 200': (r) => r.status === 200,
            'response time < 500ms': (r) => r.timings.duration < 500,
          });
          sleep(1);
        }
        EOF
        
        # Run performance test
        WEB_URL=${{ needs.build-and-deploy.outputs.web_url }} k6 run perf-test.js
